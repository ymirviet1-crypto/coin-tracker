<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Tracker</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; color:#e6edf3; font-family:-apple-system,sans-serif; padding:16px; }
  h1 { text-align:center; font-size:20px; margin-bottom:4px; color:#58a6ff; }
  .subtitle { text-align:center; font-size:12px; color:#8b949e; margin-bottom:8px; }
  .refresh-bar { text-align:center; font-size:11px; color:#8b949e; margin-bottom:12px; }
  .top-btns { display:flex; gap:8px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
  .btn { background:#21262d; border:1px solid #30363d; color:#e6edf3; padding:7px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .btn:active { background:#30363d; }
  .btn-green { border-color:#3fb950; color:#3fb950; }
  .btn-scan { border-color:#f0883e; color:#f0883e; }
  .btn-notif { border-color:#8b949e; color:#8b949e; }
  .btn-notif.on { border-color:#3fb950; color:#3fb950; }
  .tf-toggle { display:flex; gap:6px; justify-content:center; margin-bottom:16px; }
  .tf-btn { background:#21262d; border:1px solid #30363d; color:#8b949e; padding:6px 18px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:bold; }
  .tf-btn.active { background:#1f6feb; border-color:#1f6feb; color:#fff; }
  .modal-bg { display:none; position:fixed; inset:0; background:#000000cc; z-index:100; align-items:center; justify-content:center; }
  .modal-bg.show { display:flex; }
  .modal { background:#161b22; border:1px solid #30363d; border-radius:16px; padding:20px; width:calc(100% - 32px); max-width:400px; max-height:90vh; overflow-y:auto; }
  .modal h2 { font-size:16px; margin-bottom:16px; color:#58a6ff; }
  .form-row { margin-bottom:14px; }
  .form-row label { display:block; font-size:12px; color:#8b949e; margin-bottom:4px; }
  .form-row input { width:100%; background:#0d1117; border:1px solid #30363d; color:#e6edf3; padding:9px 12px; border-radius:8px; font-size:14px; }
  .form-row input:focus { outline:none; border-color:#58a6ff; }
  .form-hint { font-size:11px; color:#8b949e; margin-top:3px; }
  .modal-btns { display:flex; gap:8px; margin-top:16px; }
  .modal-btns .btn { flex:1; text-align:center; }
  .btn-primary { background:#1f6feb; border-color:#1f6feb; color:#fff; }
  /* Chart modal */
  .chart-modal { background:#161b22; border:1px solid #30363d; border-radius:16px; padding:12px; width:calc(100% - 24px); max-width:560px; height:80vh; display:flex; flex-direction:column; }
  .chart-modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .chart-modal-head h2 { font-size:16px; color:#58a6ff; }
  .chart-close { background:none; border:none; color:#8b949e; font-size:22px; cursor:pointer; }
  #tv_chart { flex:1; border-radius:8px; overflow:hidden; }
  /* Cards */
  .card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:16px; margin-bottom:16px; position:relative; }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .coin-name { font-size:18px; font-weight:bold; cursor:pointer; }
  .coin-name .chart-ico { font-size:13px; color:#58a6ff; margin-left:6px; }
  .price { font-size:22px; font-weight:bold; }
  .signal-banner { text-align:center; font-weight:bold; font-size:14px; padding:8px; border-radius:8px; margin-bottom:10px; }
  .sig-buy { background:#3fb9501a; border:1px solid #3fb950; color:#3fb950; }
  .sig-wait { background:#d299221a; border:1px solid #d29922; color:#d29922; }
  .sig-avoid { background:#f851491a; border:1px solid #f85149; color:#f85149; }
  .entry-zone { text-align:center; font-size:13px; color:#58a6ff; margin-bottom:10px; padding:6px; background:#1f6feb1a; border-radius:8px; }
  .entry-row { display:flex; justify-content:space-between; font-size:13px; color:#8b949e; margin-bottom:8px; }
  .pnl { font-size:14px; font-weight:bold; padding:4px 10px; border-radius:20px; }
  .pnl.profit { background:#1a4731; color:#3fb950; }
  .pnl.loss { background:#4d1f1f; color:#f85149; }
  .stats-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .stat-pill { font-size:11px; padding:3px 8px; border-radius:12px; background:#21262d; }
  .stat-up { color:#3fb950; } .stat-down { color:#f85149; } .stat-neutral { color:#8b949e; }
  .vol-spike { background:#2d2208; color:#d29922; border:1px solid #d29922; }
  .levels { margin-top:10px; }
  .level-row { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; border-radius:8px; margin-bottom:4px; font-size:13px; }
  .level-sl { background:#2d1515; border-left:3px solid #f85149; }
  .level-tp { background:#0d2618; border-left:3px solid #3fb950; }
  .level-hit { animation:pulse 1s infinite; }
  .level-label { color:#8b949e; } .level-price { font-weight:bold; } .level-action { font-size:11px; color:#8b949e; }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
  .dot-green { background:#3fb950; } .dot-red { background:#f85149; }
  .dot-yellow { background:#d29922; } .dot-orange { background:#f0883e; }
  .alert-box { border-radius:8px; padding:10px; text-align:center; font-size:13px; margin-top:6px; }
  .alert-sl { background:#f851491a; border:1px solid #f85149; color:#f85149; }
  .alert-tp { background:#3fb9501a; border:1px solid #3fb950; color:#3fb950; }
  .alert-vol { background:#d299221a; border:1px solid #d29922; color:#d29922; }
  .alert-pump { background:#f0883e1a; border:1px solid #f0883e; color:#f0883e; }
  .delete-btn { position:absolute; top:12px; right:12px; background:none; border:none; color:#8b949e; font-size:16px; cursor:pointer; padding:4px; line-height:1; }
  .delete-btn:active { color:#f85149; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .divider { border:none; border-top:1px solid #30363d; margin:10px 0; }
  .summary { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:12px 16px; margin-bottom:16px; display:flex; justify-content:space-around; text-align:center; }
  .summary-item label { font-size:11px; color:#8b949e; display:block; }
  .summary-item span { font-size:16px; font-weight:bold; }
  .empty { text-align:center; color:#8b949e; padding:40px 0; font-size:14px; }
  /* Scan results */
  .scan-section { margin-bottom:20px; }
  .scan-title { font-size:14px; color:#f0883e; font-weight:bold; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
  .scan-card { background:#161b22; border:1px solid #f0883e44; border-radius:10px; padding:12px; margin-bottom:10px; }
  .scan-card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .scan-name { font-size:15px; font-weight:bold; cursor:pointer; }
  .scan-potential { font-size:14px; font-weight:bold; color:#3fb950; }
  .scan-detail { font-size:12px; color:#8b949e; margin-bottom:8px; }
  .scan-actions { display:flex; gap:6px; }
  .scan-actions .btn { flex:1; text-align:center; padding:5px; font-size:12px; }
  .scanning { text-align:center; color:#f0883e; padding:20px; }
</style>
</head>
<body>

<h1>📊 Coin Tracker</h1>
<p class="subtitle">Binance Alpha Signal Scanner</p>
<p class="refresh-bar" id="refresh-bar">Đang tải...</p>

<div class="top-btns">
  <button class="btn btn-green" onclick="openModal()">＋ Thêm coin</button>
  <button class="btn btn-scan" onclick="scanMarket()">🔍 Quét cơ hội</button>
  <button class="btn btn-notif" id="notif-btn" onclick="requestNotif()">🔔 Bật thông báo</button>
</div>

<div class="tf-toggle">
  <button class="tf-btn" data-tf="1h" onclick="setTF('1h')">1H</button>
  <button class="tf-btn active" data-tf="4h" onclick="setTF('4h')">4H</button>
  <button class="tf-btn" data-tf="1d" onclick="setTF('1d')">1D</button>
</div>

<div id="scan-results"></div>

<div class="summary">
  <div class="summary-item"><label>Tổng P&L</label><span id="total-pnl">--</span></div>
  <div class="summary-item"><label>Khung / Cập nhật</label><span id="last-update">--</span></div>
</div>

<div id="cards"></div>

<!-- Add modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>➕ Thêm coin theo dõi</h2>
    <div class="form-row">
      <label>Ticker Symbol *</label>
      <input id="f-symbol" placeholder="VD: FHEUSDT, BTCUSDT" autocapitalize="characters">
      <p class="form-hint">Symbol Binance Futures (không có .P)</p>
    </div>
    <div class="form-row"><label>Tên hiển thị</label><input id="f-name" placeholder="Tự lấy nếu để trống"></div>
    <div class="form-row"><label>Giá mua / Entry (tuỳ chọn)</label><input id="f-entry" type="number" step="any" placeholder="Để trống → tự gợi ý vùng vào"></div>
    <div class="form-row"><label>Số lượng nắm giữ (tuỳ chọn)</label><input id="f-amount" type="number" step="any" placeholder="Để tính P&L bằng $"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="addCoin()">Thêm</button>
    </div>
  </div>
</div>

<!-- Chart modal -->
<div class="modal-bg" id="chart-modal-bg">
  <div class="chart-modal">
    <div class="chart-modal-head">
      <h2 id="chart-title">Chart</h2>
      <button class="chart-close" onclick="closeChart()">✕</button>
    </div>
    <div id="tv_chart"></div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const DEFAULT_COINS = [
  { symbol:'FHEUSDT', name:'FHE', entry:0.01979, amount:5053 },
  { symbol:'4USDT',   name:'Coin 4', entry:0.0265, amount:0 },
  { symbol:'COAIUSDT',name:'COAI', entry:0.96,  amount:0 },
];
function loadCoins(){ try{ return JSON.parse(localStorage.getItem('coins_v2')) || DEFAULT_COINS; }catch{ return DEFAULT_COINS; } }
function saveCoins(){ localStorage.setItem('coins_v2', JSON.stringify(COINS)); }
function loadHW(){ try{ return JSON.parse(localStorage.getItem('highwater')) || {}; }catch{ return {}; } }
function saveHW(){ localStorage.setItem('highwater', JSON.stringify(highWater)); }

let COINS=loadCoins(), TF='4h', data={}, highWater=loadHW(), notifEnabled=false, scanResults=null;
const alertedKeys=new Set();

function setTF(tf){ TF=tf; document.querySelectorAll('.tf-btn').forEach(b=>b.classList.toggle('active',b.dataset.tf===tf)); fetchAll(); if(scanResults) renderScan(); }

// ---- Modal add ----
function openModal(){ ['f-symbol','f-name','f-entry','f-amount'].forEach(id=>document.getElementById(id).value=''); document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function addCoin(){
  const symbol=document.getElementById('f-symbol').value.trim().toUpperCase();
  const name=document.getElementById('f-name').value.trim()||symbol.replace('USDT','');
  const entry=parseFloat(document.getElementById('f-entry').value);
  const amount=parseFloat(document.getElementById('f-amount').value)||0;
  if(!symbol){ alert('Nhập Symbol'); return; }
  if(COINS.find(c=>c.symbol===symbol)){ alert('Coin đã có!'); return; }
  COINS.push({ symbol, name, entry:isNaN(entry)?null:entry, amount });
  saveCoins(); closeModal(); fetchAll();
}
function addFromScan(symbol){
  if(COINS.find(c=>c.symbol===symbol)){ alert('Đã có trong danh sách'); return; }
  COINS.push({ symbol, name:symbol.replace('USDT',''), entry:null, amount:0 });
  saveCoins(); fetchAll(); alert(symbol+' đã thêm vào theo dõi!');
}
function deleteCoin(symbol){ if(!confirm(`Xoá ${symbol}?`))return; COINS=COINS.filter(c=>c.symbol!==symbol); saveCoins(); render(); }

// ---- Chart ----
let tvWidget=null;
function openChart(symbol,name){
  document.getElementById('chart-title').textContent='📈 '+name;
  document.getElementById('chart-modal-bg').classList.add('show');
  document.getElementById('tv_chart').innerHTML='';
  const intv = TF==='1h'?'60':(TF==='4h'?'240':'D');
  tvWidget=new TradingView.widget({
    symbol:'BINANCE:'+symbol+'.P', interval:intv, container_id:'tv_chart',
    autosize:true, theme:'dark', style:'1', locale:'vi_VN',
    toolbar_bg:'#161b22', hide_side_toolbar:true, allow_symbol_change:true,
    studies:['RSI@tv-basicstudies'],
  });
}
function closeChart(){ document.getElementById('chart-modal-bg').classList.remove('show'); document.getElementById('tv_chart').innerHTML=''; }

// ---- Notification ----
function requestNotif(){
  if(!('Notification' in window)) return alert('Không hỗ trợ thông báo');
  Notification.requestPermission().then(p=>{ notifEnabled=p==='granted';
    const b=document.getElementById('notif-btn'); b.textContent=notifEnabled?'🔔 Thông báo bật':'🔕 Chưa cấp quyền'; b.className=notifEnabled?'btn btn-notif on':'btn btn-notif'; });
}
function maybeNotify(k,t,b){ if(!alertedKeys.has(k)){ alertedKeys.add(k); if(notifEnabled) new Notification(t,{body:b}); } }

// ---- Indicators ----
function ema(a,n){ const k=2/(n+1); let e=a.slice(0,n).reduce((x,y)=>x+y,0)/n; for(let i=n;i<a.length;i++)e=a[i]*k+e*(1-k); return e; }
function rsi(c,n=14){ let g=0,l=0; for(let i=1;i<=n;i++){const d=c[i]-c[i-1]; if(d>=0)g+=d; else l-=d;} let ag=g/n,al=l/n;
  for(let i=n+1;i<c.length;i++){const d=c[i]-c[i-1]; ag=(ag*(n-1)+(d>0?d:0))/n; al=(al*(n-1)+(d<0?-d:0))/n;} if(al===0)return 100; return 100-100/(1+ag/al); }
function atr(h,l,c,n=14){ const tr=[]; for(let i=1;i<c.length;i++)tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1]))); const s=tr.slice(-n); return s.reduce((a,b)=>a+b,0)/s.length; }

// ---- Fetch ----
async function klines(sym,intv){
  const f=`https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=${intv}&limit=100`;
  const s=`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${intv}&limit=100`;
  try{ const r=await fetch(f); if(!r.ok)throw 0; return await r.json(); }catch{ const r=await fetch(s); return await r.json(); }
}
async function ticker(sym){
  const f=`https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=${sym}`;
  const s=`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`;
  try{ const r=await fetch(f); if(!r.ok)throw 0; return await r.json(); }catch{ const r=await fetch(s); return await r.json(); }
}

async function analyze(coin){
  const [k,t]=await Promise.all([klines(coin.symbol,TF),ticker(coin.symbol)]);
  const highs=k.map(x=>+x[2]),lows=k.map(x=>+x[3]),closes=k.map(x=>+x[4]),vols=k.map(x=>+x[5]);
  const price=closes[closes.length-1], _atr=atr(highs,lows,closes), _rsi=rsi(closes);
  const ema20=ema(closes,20),ema50=ema(closes,50);
  const support=Math.min(...lows.slice(-20)),resistance=Math.max(...highs.slice(-20));
  if(!highWater[coin.symbol]||price>highWater[coin.symbol]) highWater[coin.symbol]=price; saveHW();
  let SL=Math.max(support-0.5*_atr, price-2*_atr); SL=Math.max(SL,highWater[coin.symbol]-2*_atr); if(SL>=price)SL=price-1.5*_atr;
  const TP=[Math.max(price+2*_atr,resistance>price?resistance:price+2*_atr),price+4*_atr,price+6*_atr].sort((a,b)=>a-b);
  const avgVol=vols.slice(-21,-1).reduce((a,b)=>a+b,0)/20, curVol=vols[vols.length-1];
  const volSpike=curVol>2*avgVol, volRatio=avgVol?curVol/avgVol:1;
  const trendUp=ema20>ema50, nearSupport=price<=support+1.5*_atr, change24=+t.priceChangePercent;
  let signal,sigClass;
  if(_rsi>72){ signal='🔴 TRÁNH — Quá mua (RSI '+_rsi.toFixed(0)+')'; sigClass='sig-avoid'; }
  else if(change24<=-12){ signal='🟡 CHỜ — Đang giảm mạnh, chờ ổn định'; sigClass='sig-wait'; }
  else if(nearSupport&&_rsi<55){ signal='🟢 NÊN VÀO — Gần support, RSI thấp'; sigClass='sig-buy'; }
  else if(trendUp&&_rsi<60&&price>ema20){ signal='🟢 NÊN VÀO — Xu hướng tăng'; sigClass='sig-buy'; }
  else { signal='🟡 CHỜ — Chưa về vùng đẹp'; sigClass='sig-wait'; }
  return { price,atr:_atr,rsi:_rsi,trendUp,support,resistance,SL,TP,entryLow:support,entryHigh:support+_atr,
           volSpike,volRatio,change24,quoteVol:+t.quoteVolume,signal,sigClass };
}
async function fetchAll(){
  await Promise.all(COINS.map(async c=>{ try{ data[c.symbol]=await analyze(c); }catch(e){ console.warn(c.symbol,e); } }));
  render(); updateTime();
}

// ---- Market scanner ----
async function scanMarket(){
  const box=document.getElementById('scan-results');
  box.innerHTML='<div class="scan-section"><div class="scanning">🔍 Đang quét toàn thị trường... chờ chút anh nhé</div></div>';
  try{
    const r=await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
    const all=await r.json();
    // lọc nhanh
    let cands=all.filter(t=>{
      if(!t.symbol.endsWith('USDT')) return false;
      const last=+t.lastPrice,hi=+t.highPrice,lo=+t.lowPrice,qv=+t.quoteVolume,ch=+t.priceChangePercent;
      if(qv<5e6) return false;                 // thanh khoản
      if(hi===lo) return false;
      const pos=(last-lo)/(hi-lo);             // vị trí trong range 24h
      return pos<0.4 && ch>-25;                // gần đáy, không sập quá
    }).map(t=>{
      const last=+t.lastPrice,hi=+t.highPrice;
      return { symbol:t.symbol, price:last, change:+t.priceChangePercent, qv:+t.quoteVolume, upside:(hi-last)/last*100 };
    }).sort((a,b)=>b.upside-a.upside).slice(0,12);

    // phân tích sâu top 12
    const detailed=[];
    for(const c of cands){
      try{
        const k=await klines(c.symbol,'4h');
        const highs=k.map(x=>+x[2]),lows=k.map(x=>+x[3]),closes=k.map(x=>+x[4]);
        const _rsi=rsi(closes),_atr=atr(highs,lows,closes);
        const support=Math.min(...lows.slice(-20)),resistance=Math.max(...highs.slice(-20));
        const price=closes[closes.length-1];
        const nearSupport=price<=support+1.5*_atr;
        const potential=(resistance-price)/price*100;
        // điều kiện vùng đẹp
        if(_rsi>=30 && _rsi<=58 && potential>8){
          detailed.push({ ...c, rsi:_rsi, potential, nearSupport, resistance, support });
        }
      }catch(e){}
    }
    detailed.sort((a,b)=>b.potential-a.potential);
    scanResults=detailed.slice(0,8);
    renderScan();
  }catch(e){
    box.innerHTML='<div class="scan-section"><div class="scanning">⚠️ Lỗi quét — thử lại sau</div></div>';
  }
}
function renderScan(){
  const box=document.getElementById('scan-results');
  if(!scanResults||scanResults.length===0){
    box.innerHTML='<div class="scan-section"><div class="scan-title"><span>🔥 Cơ hội vùng đẹp</span><button class="btn" style="padding:3px 10px;font-size:11px" onclick="clearScan()">Ẩn</button></div><div class="scanning" style="color:#8b949e">Không tìm thấy coin nào ở vùng đẹp lúc này.</div></div>';
    return;
  }
  let html='<div class="scan-section"><div class="scan-title"><span>🔥 Cơ hội vùng đẹp ('+scanResults.length+')</span><button class="btn" style="padding:3px 10px;font-size:11px" onclick="clearScan()">Ẩn</button></div>';
  scanResults.forEach(s=>{
    const name=s.symbol.replace('USDT','');
    html+=`<div class="scan-card">
      <div class="scan-card-head">
        <span class="scan-name" onclick="openChart('${s.symbol}','${name}')">🔥 ${name} <span style="font-size:11px;color:#58a6ff">📈</span></span>
        <span class="scan-potential">Tiềm năng +${s.potential.toFixed(0)}%</span>
      </div>
      <div class="scan-detail">$${fmt(s.price)} · RSI ${s.rsi.toFixed(0)} · ${s.nearSupport?'gần support ✅':'giữa range'} · Vol ${fmtVol(s.qv)}$ · 24h ${s.change>=0?'+':''}${s.change.toFixed(1)}%</div>
      <div class="scan-actions">
        <button class="btn btn-green" onclick="addFromScan('${s.symbol}')">+ Theo dõi</button>
        <button class="btn" onclick="openChart('${s.symbol}','${name}')">📈 Chart</button>
      </div>
    </div>`;
  });
  html+='</div>';
  box.innerHTML=html;
}
function clearScan(){ scanResults=null; document.getElementById('scan-results').innerHTML=''; }

function updateTime(){ const t=new Date().toLocaleTimeString('vi-VN'); document.getElementById('last-update').textContent=`${TF.toUpperCase()} · ${t}`; document.getElementById('refresh-bar').textContent=`🔄 Tự cập nhật 30s | Khung ${TF.toUpperCase()} | ${t}`; }
function fmt(n){ if(n===null||n===undefined||isNaN(n))return '--'; if(n>=100)return n.toFixed(2); if(n>=1)return n.toFixed(4); if(n>=0.01)return n.toFixed(5); return n.toFixed(6); }
function fmtVol(v){ if(v>=1e9)return(v/1e9).toFixed(1)+'B'; if(v>=1e6)return(v/1e6).toFixed(1)+'M'; if(v>=1e3)return(v/1e3).toFixed(1)+'K'; return(v||0).toFixed(0); }

function render(){
  if(COINS.length===0){ document.getElementById('cards').innerHTML='<p class="empty">Chưa có coin nào.<br>Nhấn <b>＋ Thêm coin</b> hoặc <b>🔍 Quét cơ hội</b>!</p>'; document.getElementById('total-pnl').textContent='--'; return; }
  let totalPnl=0,html='';
  COINS.forEach(coin=>{
    const d=data[coin.symbol];
    if(!d){ html+=`<div class="card"><button class="delete-btn" onclick="deleteCoin('${coin.symbol}')">✕</button><div class="card-header"><span class="coin-name"><span class="status-dot dot-yellow"></span>${coin.name}</span><span style="color:#8b949e;font-size:13px">Đang tải...</span></div></div>`; return; }
    const price=d.price, hasEntry=coin.entry!==null&&coin.entry!==undefined;
    const pct=hasEntry?((price-coin.entry)/coin.entry*100):null;
    const pnlUsd=(hasEntry&&coin.amount>0)?((price-coin.entry)*coin.amount):null;
    if(pnlUsd)totalPnl+=pnlUsd;
    const isProfit=pct>=0, isSLHit=price<=d.SL, hitTPs=d.TP.filter(tp=>price>=tp);
    let dotClass='dot-yellow'; if(isSLHit)dotClass='dot-red'; else if(d.change24>=10||d.volSpike)dotClass='dot-orange'; else if(d.sigClass==='sig-buy')dotClass='dot-green';
    let alerts='';
    if(isSLHit){ alerts+=`<div class="alert-box alert-sl">🚨 Chạm SL $${fmt(d.SL)} — Cân nhắc thoát!</div>`; maybeNotify(`sl-${coin.symbol}`,`🚨 ${coin.name} chạm SL!`,`Giá ${fmt(price)}`); }
    if(hitTPs.length>0){ const tp=hitTPs[hitTPs.length-1]; alerts+=`<div class="alert-box alert-tp">✅ Đạt TP $${fmt(tp)} — Chốt lời!</div>`; maybeNotify(`tp-${coin.symbol}-${tp}`,`✅ ${coin.name} đạt TP!`,`Giá ${fmt(price)}`); }
    if(d.volSpike){ alerts+=`<div class="alert-box alert-vol">📊 Volume đột biến ${d.volRatio.toFixed(1)}× — Sắp biến động!</div>`; maybeNotify(`vol-${coin.symbol}-${Math.floor(Date.now()/300000)}`,`📊 ${coin.name} Volume đột biến!`,`${d.volRatio.toFixed(1)}× TB`); }
    if(d.change24>=10){ alerts+=`<div class="alert-box alert-pump">🚀 Tăng +${d.change24.toFixed(1)}% 24h!</div>`; maybeNotify(`pump-${coin.symbol}-${Math.floor(Date.now()/3600000)}`,`🚀 ${coin.name} pump!`,`+${d.change24.toFixed(1)}%`); }
    if(d.change24<=-10){ alerts+=`<div class="alert-box alert-sl">📉 Giảm ${d.change24.toFixed(1)}% 24h!</div>`; }
    let entryBlock=hasEntry
      ? `<div class="entry-row"><span>Entry: $${fmt(coin.entry)}</span><span class="pnl ${isProfit?'profit':'loss'}">${isProfit?'+':''}${pct.toFixed(2)}%${pnlUsd!==null?` ($${pnlUsd.toFixed(2)})`:''}</span></div>`
      : `<div class="entry-zone">🎯 Vùng vào gợi ý: $${fmt(d.entryLow)} – $${fmt(d.entryHigh)}</div>`;
    const tpHtml=d.TP.map((tp,i)=>{ const hit=price>=tp; return `<div class="level-row level-tp ${hit?'level-hit':''}"><span class="level-label">TP${i+1}${hit?' ✅':''}</span><span class="level-price">$${fmt(tp)}</span><span class="level-action">+${((tp/price-1)*100).toFixed(0)}%</span></div>`; }).join('');
    html+=`<div class="card">
      <button class="delete-btn" onclick="deleteCoin('${coin.symbol}')">✕</button>
      <div class="card-header">
        <span class="coin-name" onclick="openChart('${coin.symbol}','${coin.name}')"><span class="status-dot ${dotClass}"></span>${coin.name}<span class="chart-ico">📈</span></span>
        <span class="price" style="color:${hasEntry?(isProfit?'#3fb950':'#f85149'):'#e6edf3'}">$${fmt(price)}</span>
      </div>
      <div class="signal-banner ${d.sigClass}">${d.signal}</div>
      ${entryBlock}
      <div class="stats-row">
        <span class="stat-pill ${d.change24>=0?'stat-up':'stat-down'}">${d.change24>=0?'▲':'▼'} ${Math.abs(d.change24).toFixed(1)}% 24h</span>
        <span class="stat-pill stat-neutral">RSI ${d.rsi.toFixed(0)}</span>
        <span class="stat-pill ${d.trendUp?'stat-up':'stat-down'}">EMA ${d.trendUp?'tăng':'giảm'}</span>
        <span class="stat-pill stat-neutral">ATR ${(d.atr/price*100).toFixed(1)}%</span>
        <span class="stat-pill ${d.volSpike?'vol-spike':'stat-neutral'}">Vol ${fmtVol(d.quoteVol)}$</span>
      </div>
      <hr class="divider">
      <div class="levels">
        <div class="level-row level-sl ${isSLHit?'level-hit':''}"><span class="level-label">SL${isSLHit?' 🚨':''} (trailing)</span><span class="level-price">$${fmt(d.SL)}</span><span class="level-action">${((d.SL/price-1)*100).toFixed(0)}%</span></div>
        ${tpHtml}
      </div>
      ${alerts}
    </div>`;
  });
  document.getElementById('cards').innerHTML=html;
  const el=document.getElementById('total-pnl'); if(totalPnl!==0){ el.textContent=`${totalPnl>=0?'+':''}$${totalPnl.toFixed(2)}`; el.style.color=totalPnl>=0?'#3fb950':'#f85149'; }
}

fetchAll();
setInterval(fetchAll,30000);
</script>
</body>
</html>
